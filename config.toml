# NetWatch Monitor Configuration
# Add servers you want to monitor

# Ping interval in seconds
interval = 2

# Ping timeout in milliseconds (applies to all servers)
timeout_ms = 2000

# History size (number of samples to keep per server)
history_size = 120

# External IP monitoring configuration
[external_ip]
# Endpoint to fetch external IP (returns plain IP)
endpoint = "https://ifconfig.io/ip"

# Whois information is automatically fetched from ipwho.is (ipwho.is/{IP})
# This field is kept for config compatibility but not used
whois_endpoint = ""

# How often to check external IP (in seconds)
check_interval_sec = 300

# Servers to monitor
[[servers]]
name = "Gateway"
host = "192.168.1.1"

[[servers]]
name = "Google DNS 1"
host = "8.8.8.8"

[[servers]]
name = "Google DNS 2"
host = "8.8.4.4"

[[servers]]
name = "Cloudflare DNS"
host = "1.1.1.1"

[[servers]]
name = "Yandex DNS"
host = "77.88.8.8"

[[servers]]
name = "Google HTTPS"
host = "google.com"

[[servers]]
name = "GitHub"
host = "github.com"

[[servers]]
name = "Yandex"
host = "ya.ru"
